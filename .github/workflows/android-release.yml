name: Android Release Build

on:
  workflow_dispatch: # Allows manual triggering from the GitHub Actions UI

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    # Restrict execution strictly to the username 'rld-jl'
    if: github.actor == 'rld-jl'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-home-cache-cleanup: false

      # Decode the base64 keystore securely from process memory
      - name: Decode Keystore
        env:
          ENCODED_KEYSTORE: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          mkdir -p release
          python3 -c "import os, base64; open('release/release.keystore', 'wb').write(base64.b64decode(os.environ['ENCODED_KEYSTORE']))"

      # Build the production APK and AAB (App Bundle)
      - name: Build Release APK & AAB
        env:
          AUDIUS_API_KEY: ${{ secrets.AUDIUS_API_KEY }}
          AUDIUS_BEARER_TOKEN: ${{ secrets.AUDIUS_BEARER_TOKEN }}
          RELEASE_KEYSTORE_PATH: ../release/release.keystore # Path relative to androidApp folder
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew :androidApp:assembleRelease :androidApp:bundleRelease

      # Upload the compiled artifacts to GitHub
      - name: Upload Release Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            androidApp/build/outputs/apk/release/*.apk
            androidApp/build/outputs/bundle/release/*.aab
